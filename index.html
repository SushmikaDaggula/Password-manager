<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vault — Password Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Variables ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0b0f;
    --surface: #111218;
    --card:    #16181f;
    --border:  #1f2130;
    --border2: #2a2d3e;
    --accent:  #5effa0;
    --accent2: #4de8ff;
    --danger:  #ff5c6a;
    --warn:    #ffb547;
    --text:    #e8eaf2;
    --muted:   #666c88;
    --font-display: 'Syne', sans-serif;
    --font-mono:    'Space Mono', monospace;
  }

  html { font-size: 15px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Noise texture overlay ─────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── Header ────────────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(10,11,15,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 1.4rem; font-weight: 800;
    letter-spacing: -.02em;
    display: flex; align-items: center; gap: .5rem;
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .4; transform: scale(.7); }
  }
  .header-meta { font-size: .7rem; color: var(--muted); }

  /* ── Layout ────────────────────────────────────────────────── */
  main {
    max-width: 900px; margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
    position: relative; z-index: 1;
  }

  /* ── Section titles ────────────────────────────────────────── */
  .section-label {
    font-family: var(--font-display);
    font-size: .65rem; font-weight: 600; letter-spacing: .15em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 1rem;
  }

  /* ── Add Credential Card ───────────────────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem;
    margin-bottom: 2rem;
  }
  .card:hover { border-color: var(--border2); }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .form-group { display: flex; flex-direction: column; gap: .4rem; }
  .form-group.full { grid-column: 1/-1; }

  label {
    font-size: .7rem; letter-spacing: .1em;
    color: var(--muted); text-transform: uppercase;
  }

  input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: .85rem;
    padding: .65rem .9rem;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    width: 100%;
  }
  input:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(78,232,255,.07);
  }
  input::placeholder { color: var(--muted); }

  /* password field wrapper */
  .pw-wrapper {
    position: relative; display: flex; align-items: center;
  }
  .pw-wrapper input { padding-right: 5rem; }
  .pw-actions {
    position: absolute; right: .5rem;
    display: flex; gap: .35rem;
  }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: .75rem;
    padding: .25rem .4rem; border-radius: 5px;
    transition: color .12s, background .12s;
    line-height: 1;
  }
  .icon-btn:hover { color: var(--text); background: var(--border); }

  /* strength bar */
  .strength-row { display: flex; align-items: center; gap: .6rem; margin-top: .3rem; }
  .strength-bar {
    flex: 1; height: 4px; border-radius: 2px;
    background: var(--border); overflow: hidden;
  }
  .strength-fill {
    height: 100%; border-radius: 2px;
    transition: width .3s, background .3s;
    width: 0%;
  }
  .strength-label { font-size: .65rem; min-width: 3.5rem; text-align: right; }

  /* generate row */
  .gen-row { display: flex; align-items: center; gap: .5rem; margin-top: .5rem; }
  .gen-row input[type=range] {
    flex: 1; accent-color: var(--accent);
    padding: 0; height: auto; border: none;
    background: none; box-shadow: none;
  }
  .gen-label { font-size: .7rem; color: var(--muted); white-space: nowrap; }

  /* ── Buttons ────────────────────────────────────────────────── */
  .btn {
    font-family: var(--font-mono);
    font-size: .8rem; letter-spacing: .05em;
    border: none; border-radius: 8px;
    cursor: pointer; padding: .65rem 1.4rem;
    transition: opacity .12s, transform .1s;
    font-weight: 700;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary {
    background: var(--accent); color: #0a0f0a;
  }
  .btn-primary:hover { opacity: .88; }
  .btn-ghost {
    background: var(--border); color: var(--text);
  }
  .btn-ghost:hover { background: var(--border2); }
  .btn-danger {
    background: none; border: 1px solid transparent;
    color: var(--muted); font-size: .75rem; padding: .35rem .6rem;
  }
  .btn-danger:hover { color: var(--danger); border-color: var(--danger); }

  .form-actions { display: flex; gap: .75rem; align-items: center; margin-top: 1.25rem; }
  .form-actions .spacer { flex: 1; }
  .msg { font-size: .75rem; color: var(--accent); }
  .msg.err { color: var(--danger); }

  /* ── Search bar ─────────────────────────────────────────────── */
  .search-row {
    display: flex; gap: .75rem; align-items: center;
    margin-bottom: 1.25rem;
  }
  .search-row input { flex: 1; }
  .count-badge {
    font-size: .7rem; color: var(--muted);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: .25rem .75rem;
    white-space: nowrap;
  }

  /* ── Credentials list ───────────────────────────────────────── */
  #cred-list { display: flex; flex-direction: column; gap: .75rem; }

  .cred-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 1rem;
    animation: fadeUp .25s ease both;
    transition: border-color .15s;
  }
  .cred-card:hover { border-color: var(--border2); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cred-favicon {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; overflow: hidden; flex-shrink: 0;
  }
  .cred-favicon img { width: 100%; height: 100%; object-fit: cover; }

  .cred-info { min-width: 0; }
  .cred-site {
    font-family: var(--font-display);
    font-size: .95rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cred-user {
    font-size: .75rem; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .cred-pw-area {
    font-size: .75rem; color: var(--muted);
    display: flex; align-items: center; gap: .35rem; margin-top: .2rem;
  }
  .cred-pw-text { letter-spacing: .05em; }

  .cred-actions {
    display: flex; align-items: center; gap: .4rem; flex-shrink: 0;
  }

  /* ── Strength pill ──────────────────────────────────────────── */
  .pill {
    font-size: .6rem; letter-spacing: .08em; text-transform: uppercase;
    font-weight: 700; padding: .2rem .55rem; border-radius: 20px;
    border: 1px solid currentColor;
  }
  .pill.weak   { color: var(--danger); }
  .pill.medium { color: var(--warn); }
  .pill.strong { color: var(--accent); }

  /* ── Empty state ────────────────────────────────────────────── */
  .empty {
    text-align: center; padding: 4rem 1rem;
    color: var(--muted); font-size: .85rem;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; opacity: .4; }

  /* ── Toast ──────────────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 2rem; right: 2rem;
    background: var(--card); border: 1px solid var(--border2);
    color: var(--accent); font-size: .8rem;
    padding: .65rem 1.2rem; border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    transform: translateY(10px); opacity: 0;
    transition: all .2s ease; pointer-events: none; z-index: 100;
  }
  #toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .cred-card { grid-template-columns: auto 1fr; }
    .cred-actions { grid-column: 1/-1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    VAULT
  </div>
  <span class="header-meta">LOCAL · ENCRYPTED · SECURE</span>
</header>

<main>
  <!-- ── ADD CREDENTIAL ─────────────────────────────────────── -->
  <p class="section-label">Add Credential</p>
  <div class="card">
    <div class="form-grid">
      <div class="form-group">
        <label for="f-website">Website</label>
        <input id="f-website" type="text" placeholder="github.com" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label for="f-username">Username / Email</label>
        <input id="f-username" type="text" placeholder="you@example.com" autocomplete="off"/>
      </div>
      <div class="form-group full">
        <label for="f-password">Password</label>
        <div class="pw-wrapper">
          <input id="f-password" type="password" placeholder="Enter or generate a password" autocomplete="new-password"/>
          <div class="pw-actions">
            <button class="icon-btn" id="toggle-new-pw" title="Show/hide">👁</button>
            <button class="icon-btn" id="gen-btn" title="Generate">⚡</button>
          </div>
        </div>
        <div class="strength-row">
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <span class="strength-label" id="strength-label" style="color:var(--muted)"></span>
        </div>
        <div class="gen-row" id="gen-row" style="display:none">
          <span class="gen-label">Length:</span>
          <input type="range" id="gen-length" min="8" max="48" value="16"/>
          <span class="gen-label" id="gen-len-val">16</span>
          <button class="btn btn-ghost" id="regen-btn" style="padding:.4rem .8rem;font-size:.72rem;">Regenerate</button>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="save-btn">+ Add to Vault</button>
      <span class="spacer"></span>
      <span class="msg" id="form-msg"></span>
    </div>
  </div>

  <!-- ── CREDENTIALS LIST ───────────────────────────────────── -->
  <p class="section-label">Your Vault</p>
  <div class="search-row">
    <input id="search" type="text" placeholder="🔍  Search by website…" autocomplete="off"/>
    <span class="count-badge" id="count-badge">0 entries</span>
  </div>
  <div id="cred-list">
    <div class="empty"><div class="empty-icon">🔐</div>No credentials yet. Add one above.</div>
  </div>
</main>

<div id="toast"></div>

<script>
  const API = "http://localhost:5000/api";

  // ── Helpers ──────────────────────────────────────────────────
  function toast(msg, err = false) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.color = err ? "var(--danger)" : "var(--accent)";
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
  }

  async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
      headers: { "Content-Type": "application/json" },
      ...opts,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || res.statusText);
    }
    return res.json();
  }

  function strengthStyle(s) {
    if (s === "Strong") return { w: "100%", bg: "var(--accent)",  col: "var(--accent)" };
    if (s === "Medium") return { w:  "55%", bg: "var(--warn)",   col: "var(--warn)"   };
    return                       { w:  "22%", bg: "var(--danger)", col: "var(--danger)" };
  }

  function pillHtml(strength) {
    const cls = strength ? strength.toLowerCase() : "weak";
    return `<span class="pill ${cls}">${strength || "—"}</span>`;
  }

  function favicon(website) {
    const clean = website.replace(/^https?:\/\//, "").replace(/\/.*/, "");
    return `https://www.google.com/s2/favicons?sz=64&domain=${clean}`;
  }

  function domainIcon(website) {
    const letter = (website || "?")[0].toUpperCase();
    try {
      const url = new URL(website.startsWith("http") ? website : "https://" + website);
      return `<img src="${favicon(url.hostname)}" onerror="this.parentElement.textContent='${letter}'" alt="${letter}"/>`;
    } catch {
      return letter;
    }
  }

  // ── Strength checker ─────────────────────────────────────────
  const fPw    = document.getElementById("f-password");
  const sFill  = document.getElementById("strength-fill");
  const sLabel = document.getElementById("strength-label");

  async function updateStrength(pw) {
    if (!pw) { sFill.style.width = "0"; sLabel.textContent = ""; return; }
    try {
      const { strength } = await apiFetch("/strength", {
        method: "POST", body: JSON.stringify({ password: pw })
      });
      const s = strengthStyle(strength);
      sFill.style.width = s.w;
      sFill.style.background = s.bg;
      sLabel.style.color = s.col;
      sLabel.textContent = strength;
    } catch {}
  }

  fPw.addEventListener("input", () => updateStrength(fPw.value));

  // ── Show/hide new password ───────────────────────────────────
  document.getElementById("toggle-new-pw").addEventListener("click", () => {
    fPw.type = fPw.type === "password" ? "text" : "password";
  });

  // ── Password generator ───────────────────────────────────────
  const genRow   = document.getElementById("gen-row");
  const lenSlide = document.getElementById("gen-length");
  const lenVal   = document.getElementById("gen-len-val");

  lenSlide.addEventListener("input", () => { lenVal.textContent = lenSlide.value; });

  async function generatePw() {
    try {
      const { password } = await apiFetch(`/generate?length=${lenSlide.value}`);
      fPw.value = password;
      fPw.type = "text";
      await updateStrength(password);
    } catch (e) { toast("Generator error: " + e.message, true); }
  }

  document.getElementById("gen-btn").addEventListener("click", () => {
    genRow.style.display = genRow.style.display === "none" ? "flex" : "none";
    generatePw();
  });
  document.getElementById("regen-btn").addEventListener("click", generatePw);

  // ── Load & render credentials ────────────────────────────────
  let credentials = [];

  async function loadCredentials(q = "") {
    try {
      credentials = await apiFetch("/credentials" + (q ? `?q=${encodeURIComponent(q)}` : ""));
      renderList(credentials);
    } catch (e) { toast("Failed to load: " + e.message, true); }
  }

  function renderList(list) {
    const el = document.getElementById("cred-list");
    document.getElementById("count-badge").textContent = `${list.length} entr${list.length === 1 ? "y" : "ies"}`;
    if (!list.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">🔐</div>No credentials found.</div>`;
      return;
    }
    el.innerHTML = list.map(c => credCardHtml(c)).join("");
    // attach events
    list.forEach(c => {
      document.getElementById(`copy-u-${c.id}`).addEventListener("click", () => copyText(c.username, "Username copied!"));
      document.getElementById(`copy-p-${c.id}`).addEventListener("click", () => copyText(c.password, "Password copied!"));
      document.getElementById(`toggle-${c.id}`).addEventListener("click", () => togglePw(c.id, c.password));
      document.getElementById(`del-${c.id}`).addEventListener("click", () => deleteCredential(c.id, c.website));
    });
  }

  function credCardHtml(c) {
    const strength = checkStrengthLocal(c.password);
    const masked   = "•".repeat(Math.min(c.password.length, 16));
    return `
      <div class="cred-card" id="card-${c.id}">
        <div class="cred-favicon">${domainIcon(c.website)}</div>
        <div class="cred-info">
          <div class="cred-site">${escHtml(c.website)}</div>
          <div class="cred-user">
            ${escHtml(c.username)}
            <button class="icon-btn" id="copy-u-${c.id}" title="Copy username">📋</button>
          </div>
          <div class="cred-pw-area">
            <span class="cred-pw-text" id="pw-text-${c.id}">${masked}</span>
            <button class="icon-btn" id="toggle-${c.id}" title="Show/hide">👁</button>
            <button class="icon-btn" id="copy-p-${c.id}" title="Copy password">📋</button>
            ${pillHtml(strength)}
          </div>
        </div>
        <div class="cred-actions">
          <button class="btn btn-danger" id="del-${c.id}">Delete</button>
        </div>
      </div>`;
  }

  // local strength for rendering (no extra API call)
  function checkStrengthLocal(pw) {
    if (!pw || pw.length < 6) return "Weak";
    const hasU = /[A-Z]/.test(pw), hasL = /[a-z]/.test(pw),
          hasD = /\d/.test(pw),    hasS = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>/?`~]/.test(pw);
    const score = [hasU, hasL, hasD, hasS].filter(Boolean).length;
    if (pw.length >= 12 && score === 4) return "Strong";
    if (pw.length >= 8  && score >= 3)  return "Medium";
    return "Weak";
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // toggle show/hide password in list
  function togglePw(id, realPw) {
    const el = document.getElementById(`pw-text-${id}`);
    const masked = "•".repeat(Math.min(realPw.length, 16));
    el.textContent = el.textContent === masked ? realPw : masked;
  }

  async function copyText(text, msg) {
    try {
      await navigator.clipboard.writeText(text);
      toast(msg);
    } catch { toast("Clipboard error", true); }
  }

  async function deleteCredential(id, website) {
    if (!confirm(`Delete credentials for "${website}"?`)) return;
    try {
      await apiFetch(`/credentials/${id}`, { method: "DELETE" });
      toast("Deleted!");
      loadCredentials(document.getElementById("search").value);
    } catch (e) { toast(e.message, true); }
  }

  // ── Add credential ───────────────────────────────────────────
  document.getElementById("save-btn").addEventListener("click", async () => {
    const website  = document.getElementById("f-website").value.trim();
    const username = document.getElementById("f-username").value.trim();
    const password = document.getElementById("f-password").value.trim();
    const msg      = document.getElementById("form-msg");

    if (!website || !username || !password) {
      msg.textContent = "All fields required.";
      msg.className = "msg err";
      return;
    }
    try {
      await apiFetch("/credentials", {
        method: "POST",
        body: JSON.stringify({ website, username, password }),
      });
      toast("✓ Saved to vault");
      ["f-website","f-username","f-password"].forEach(id => document.getElementById(id).value = "");
      sFill.style.width = "0"; sLabel.textContent = "";
      genRow.style.display = "none";
      msg.textContent = "";
      loadCredentials();
    } catch (e) {
      msg.textContent = e.message;
      msg.className = "msg err";
    }
  });

  // ── Search ───────────────────────────────────────────────────
  let searchTimer;
  document.getElementById("search").addEventListener("input", e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadCredentials(e.target.value), 250);
  });

  // ── Init ─────────────────────────────────────────────────────
  loadCredentials();
</script>
</body>
</html>
